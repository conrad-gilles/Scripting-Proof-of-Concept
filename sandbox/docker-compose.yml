services:
  db:
    image: postgres:16-alpine
    container_name: script_db_container
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=script_registry
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "8081:80"    # Web UI now at http://localhost:8081
      - "5341:5341"  # Log Ingestion now at http://localhost:5341
      # - "5341:80" # Web UI at http://localhost:5341
    volumes:
      - seqdata:/data

volumes:
  pgdata:
  seqdata:
